<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Placement OD Tracker</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="container">

        <header>

            <h1>🎓 Placement OD Tracker</h1>

            <p>
                Manage your placement OD requests easily
            </p>

        </header>


        <div class="form-card">

            <h2>Add Placement Request</h2>

            <form id="placementForm">

                <div>

                    <label>Date</label>

                    <input
                        type="date"
                        id="date"
                        required>

                </div>

                <div>

                    <label>Company</label>

                    <input
                        type="text"
                        id="company"
                        placeholder="Enter company name"
                        required>

                </div>

                <div>

                    <label>Session</label>

                    <select id="session">

                        <option>Morning</option>
                        <option>Afternoon</option>
                        <option>Full Day</option>

                    </select>

                </div>

                <div>

                    <label>Round</label>

                    <select id="round">

                        <option>Online Test</option>
                        <option>Preplacement Talk</option>
                        <option>Interview</option>

                    </select>

                </div>

                <div class="full-width">

                    <label>Remarks</label>

                    <textarea
                        id="remarks"
                        rows="4"
                        placeholder="Enter remarks (optional)"></textarea>

                </div>

                <button type="submit">

                    Add Request

                </button>

            </form>

        </div>



        <div class="table-card">

            <div class="toolbar">

                <input
                    type="text"
                    id="searchInput"
                    placeholder="🔍 Search Company...">

                <select id="sessionFilter">

                    <option value="All">All Sessions</option>
                    <option value="Morning">Morning</option>
                    <option value="Afternoon">Afternoon</option>
                    <option value="Full Day">Full Day</option>

                </select>

            </div>


            <table>

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Date</th>
                        <th>Company</th>
                        <th>Session</th>
                        <th>Round</th>
                        <th>Remarks</th>
                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="tableBody">

                </tbody>

            </table>

        </div>


        <footer>

            <p>

                © 2026 Placement OD Tracker

            </p>

        </footer>

    </div>

    <!-- JavaScript Files -->

    <script src="js/api.js"></script>

    <script src="js/utils.js"></script>

    <script src="js/table.js"></script>

    <script src="js/form.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
